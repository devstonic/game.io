<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Гарри Поттер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Georgia', 'Times New Roman', serif; }
        body { background: #0a0f1e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }
        .card { max-width: 600px; background: rgba(20, 15, 30, 0.8); backdrop-filter: blur(10px); border-radius: 70px; padding: 40px; border: 3px solid #b8860b; box-shadow: 0 0 50px #6a0dad; color: #f0e6d2; }
        h1 { font-size: 2.8rem; text-align: center; color: #b8860b; text-shadow: 0 0 20px #6a0dad; }
        .sub { text-align: center; color: #b0a0c0; margin-bottom: 30px; }
        .question { font-size: 2rem; margin: 30px 0 20px; color: #d4af37; }
        .options { display: flex; flex-direction: column; gap: 15px; }
        .option { background: #2a1e3a; border: 3px solid #b8860b; border-radius: 50px; padding: 20px; cursor: pointer; font-size: 1.3rem; transition: 0.2s; }
        .option:hover { background: #4a2e6a; border-color: gold; transform: translateX(10px); }
        .comment { background: #1e2a1e; border-left: 12px solid #b8860b; padding: 20px; margin: 25px 0; border-radius: 30px; font-size: 1.3rem; font-style: italic; color: #d0c0a0; }
        .result-box { text-align: center; background: #1a1a2a; border-radius: 60px; padding: 40px; border: 5px solid #b8860b; }
        .result-emoji { font-size: 6rem; }
        .result-title { font-size: 3.5rem; color: #d4af37; text-shadow: 0 0 20px #6a0dad; }
        .result-desc { font-size: 1.5rem; color: #b0a0c0; margin: 20px 0; }
        .btn { background: #b8860b; color: black; padding: 18px 36px; border-radius: 60px; font-size: 1.5rem; font-weight: bold; border: none; cursor: pointer; margin-top: 20px; }
        .hidden { display: none; }
        .music-note { position: fixed; bottom: 20px; right: 20px; background: #2a1e3a; padding: 15px; border-radius: 50%; cursor: pointer; border: 3px solid gold; font-size: 2rem; z-index: 100; }
    </style>
</head>
<body>
    <div class="music-note" id="musicToggle">🔇</div>
    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <h1>⚡ Гарри Поттер</h1>
        <div class="sub">какой факультет твой?</div>
        <div id="quiz">
            <div class="question" id="question"></div>
            <div class="options" id="options"></div>
            <div id="comment" class="comment hidden"></div>
        </div>
        <div id="result" class="hidden result-box">
            <div class="result-emoji" id="resEmoji"></div>
            <div class="result-title" id="resTitle"></div>
            <div class="result-desc" id="resDesc"></div>
            <button class="btn" id="reset">🪄 Ещё раз</button>
        </div>
    </div>

    <script>
        // Музыка
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicToggle');
        let musicPlaying = false;
        musicBtn.onclick = () => {
            if (musicPlaying) { music.pause(); musicBtn.innerText = '🔇'; }
            else { music.play().catch(() => {}); musicBtn.innerText = '🔊'; }
            musicPlaying = !musicPlaying;
        };

        const questions = [
            {
                q: "Что для тебя важнее всего?",
                answers: ["Храбрость и отвага", "Ум и мудрость", "Амбиции и хитрость", "Дружба и верность"],
                comments: [
                    "Смелость города берёт!",
                    "Разум — твоё оружие.",
                    "Цель оправдывает средства?",
                    "Верность — редкий дар."
                ]
            },
            {
                q: "Какое животное тебе ближе?",
                answers: ["Лев 🦁", "Змея 🐍", "Барсук 🦡", "Ворон 🦅"],
                comments: [
                    "Гриффиндорский дух!",
                    "Слизеринская натура...",
                    "Пуффендуйское тепло!",
                    "Когтевранская мудрость!"
                ]
            },
            {
                q: "Твой любимый предмет?",
                answers: ["ЗОТИ", "Зельеварение", "Травология", "Трансфигурация"],
                comments: [
                    "Защищаться от тёмных сил!",
                    "Тонкая наука...",
                    "Любовь к природе!",
                    "Менять форму реальности."
                ]
            },
            {
                q: "Какой поступок тебе ближе?",
                answers: ["Спасти друга", "Найти истину", "Достичь цели", "Помочь слабому"],
                comments: [
                    "Дружба — превыше всего!",
                    "Правда дороже.",
                    "Ты целеустремлён!",
                    "Доброта спасёт мир."
                ]
            },
            {
                q: "Твой любимый персонаж?",
                answers: ["Гарри", "Гермиона", "Дамблдор", "Снейп"],
                comments: [
                    "Мальчик, который выжил!",
                    "Самая умная ведьма!",
                    "Мудрый старец...",
                    "Сложный, но благородный."
                ]
            },
            {
                q: "Что бы ты делал в Хогвартсе?",
                answers: ["Играл в квиддич", "Читал в библиотеке", "Искал тайные ходы", "Помогал друзьям"],
                comments: [
                    "Спортсмен!",
                    "Книжный червь!",
                    "Исследователь!",
                    "Душа компании!"
                ]
            }
        ];

        const faculties = [
            { name: "ГРИФФИНДОР", emoji: "🦁", desc: "Смелый, отважный, благородный. Ты готов на подвиги ради друзей." },
            { name: "СЛИЗЕРИН", emoji: "🐍", desc: "Амбициозный, хитрый, целеустремлённый. Ты добьёшься своего." },
            { name: "ПУФФЕНДУЙ", emoji: "🦡", desc: "Добрый, трудолюбивый, верный. Ты опора и честность." },
            { name: "КОГТЕВРАН", emoji: "🦅", desc: "Умный, мудрый, творческий. Ты ищешь знания и истину." }
        ];

        let current = 0;
        let points = [0,0,0,0]; // G, S, H, R

        const quiz = document.getElementById('quiz');
        const resultDiv = document.getElementById('result');
        const qEl = document.getElementById('question');
        const optsEl = document.getElementById('options');
        const commentEl = document.getElementById('comment');

        function showQuestion() {
            if (current >= questions.length) { finish(); return; }
            qEl.innerText = questions[current].q;
            optsEl.innerHTML = '';
            questions[current].answers.forEach((ans, idx) => {
                let btn = document.createElement('div');
                btn.className = 'option';
                btn.innerText = ans;
                btn.onclick = () => {
                    // Начисляем очки: idx влияет на факультеты
                    points[idx % 4] += 3;
                    points[(idx+1) % 4] += 1;
                    points[(idx+2) % 4] += 1;
                    // Комментарий
                    commentEl.classList.remove('hidden');
                    commentEl.innerText = '🪄 ' + questions[current].comments[idx];
                    setTimeout(() => {
                        commentEl.classList.add('hidden');
                        current++;
                        showQuestion();
                    }, 2000);
                };
                optsEl.appendChild(btn);
            });
        }

        function finish() {
            quiz.style.display = 'none';
            resultDiv.classList.remove('hidden');
            let maxIdx = points.indexOf(Math.max(...points));
            let res = faculties[maxIdx % faculties.length];
            document.getElementById('resEmoji').innerText = res.emoji;
            document.getElementById('resTitle').innerText = res.name;
            document.getElementById('resDesc').innerText = res.desc;
        }

        document.getElementById('reset').onclick = () => {
            current = 0;
            points = [0,0,0,0];
            quiz.style.display = 'block';
            resultDiv.classList.add('hidden');
            showQuestion();
        };

        showQuestion();
    </script>
</body>
</html>
